<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="msvalidate.01" content="A66CABFACDB735C68CEFB0C131044662" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kwality Restaurant Gwalior</title>
    <meta
      name="description"
      content="Welcome to Kwality! Discover our exceptional products and services designed to deliver quality and satisfaction. Explore our menu, gallery, and more today!"
    />

    <script
      src="https://kit.fontawesome.com/4a9d0de6bd.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./Assets/images/icon.png" />
    <link rel="stylesheet" href="./Assets/css/modern-review.css" />
  </head>
  <body>
    <img
      class="logo"
      src="./Assets/images/logo-white 1.png"
      alt="Kwality Restaurant Logo"
      draggable="false"
    />
    <div class="main-review">
      <h2>How was your experience with us?</h2>

      <a href="https://reviewthis.biz/kwality-gwalior"
        ><button class="great-btn btn" id="great-btn">
          <h3>EXCELLENT</h3>
        </button></a
      >
      <button class="not-great-btn btn" id="not-great-btn">
        <h3>Could Be Better</h3>
      </button>
    </div>

    <section class="not-great-options options" id="not-great-options">
      <div>
        <img
          src="https://img.icons8.com/?size=512&id=G73qnboyHDjl&format=png"
          class="icon"
          id="close-not-great"
          width="25px"
          alt="Close"
        />
        <h2>We appreciate your feedback. How can we improve your experience?</h2>

        <a href="/#contact"
          ><button class="btn main-btn">
            <h3>Share Feedback</h3>
          </button></a
        >
        <a href="/"
          ><button class="btn">
            <h3>Maybe Later</h3>
          </button></a
        >
      </div>
    </section>

    <script src="./review.js"></script>
  </body>
</html>
