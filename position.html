<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwality Restaurant | Waitlist Position</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .position-display {
            text-align: center;
            padding: 40px;
            margin-top: 50px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .position {
            font-size: 72px;
            font-weight: bold;
            color: #3498db;
            margin: 30px 0;
            transition: all 0.3s ease;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
        }
        .error {
            color: #e74c3c;
            font-weight: 500;
        }
        .phone-input {
            padding: 12px 15px;
            font-size: 16px;
            width: 250px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            transition: border 0.3s ease;
        }
        .phone-input:focus {
            outline: none;
            border-color: #3498db;
        }
        .refresh-indicator {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .position-display {
                padding: 20px;
                margin-top: 20px;
            }
            .position {
                font-size: 48px;
            }
            .phone-input {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="position-display">
            <h1>Kwality Restaurant Waitlist</h1>
            <p>Enter your phone number to check your current position in the waitlist</p>
            <input type="tel" id="phoneInput" class="phone-input" placeholder="Enter your phone number" maxlength="10">
            <div id="positionDisplay" class="position">-</div>
            <p id="status">Enter your phone number to check position</p>
            <p class="refresh-indicator">Position updates automatically every few seconds</p>
        </div>
    </div>

    <script>
        const REPO_NAME = 'Suyyash-aroraa/Kwality-main';
        const phoneInput = document.getElementById('phoneInput');
        const positionDisplay = document.getElementById('positionDisplay');
        const statusElement = document.getElementById('status');
        let refreshTimer = null;

        function isValidPhone(phone) {
            return phone.length === 10 && /^\d{10}$/.test(phone);
        }

        async function fetchPosition() {
            const phoneNumber = phoneInput.value.trim();
            
            if (!isValidPhone(phoneNumber)) {
                return;
            }
            
            try {
                statusElement.textContent = 'Checking position...';
                statusElement.className = 'loading';

                const timestamp = Date.now();
                const random = Math.floor(Math.random() * 10000);
                const url = `https://raw.githubusercontent.com/${REPO_NAME}/main/position.html?t=${timestamp}&r=${random}`;
                
                const response = await fetch(url, {
                    cache: 'no-cache',
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch data');
                }
                
                const html = await response.text();
                const startMarker = '<!--POSITION_DATA_START-->
9174455550,1
<!--POSITION_DATA_END-->';
                
                const startIndex = html.indexOf(startMarker);
                const endIndex = html.indexOf(endMarker);
                
                if (startIndex === -1 || endIndex === -1) {
                    positionDisplay.textContent = '-';
                    statusElement.textContent = 'Waitlist data not available';
                    statusElement.className = 'error';
                    return;
                }
                
                let positionData = html.substring(startIndex + startMarker.length, endIndex).trim();
                
                // Clean up the data by removing HTML comments and extra whitespace
                positionData = positionData.replace(/<!--.*?-->/g, '').trim();
                
                console.log('Raw position data:', JSON.stringify(positionData));
                
                if (!positionData) {
                    positionDisplay.textContent = '-';
                    statusElement.textContent = 'No waitlist data available';
                    statusElement.className = 'error';
                    return;
                }
                
                const positions = new Map();
                const lines = positionData.split(/[\n\r]+/);
                
                console.log('Split lines:', lines);
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    console.log('Processing line:', JSON.stringify(line));
                    
                    if (line && line.includes(',')) {
                        const parts = line.split(',');
                        if (parts.length >= 2) {
                            const phone = parts[0].trim();
                            const pos = parts[1].trim();
                            console.log('Found entry:', phone, '->', pos);
                            
                            if (phone && pos && /^\d+$/.test(pos)) {
                                positions.set(phone, pos);
                            }
                        }
                    }
                }
                
                console.log('Final positions map:', positions);

                const position = positions.get(phoneNumber);
                if (position) {
                    positionDisplay.textContent = position;
                    statusElement.textContent = 'Your current position in line';
                    statusElement.className = '';
                } else {
                    positionDisplay.textContent = '-';
                    statusElement.textContent = 'Phone number not found in waitlist';
                    statusElement.className = 'error';
                }
                
            } catch (error) {
                console.error('Error:', error);
                positionDisplay.textContent = '-';
                statusElement.textContent = 'Error checking position. Please try again.';
                statusElement.className = 'error';
            }
        }

        function startAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
            refreshTimer = setInterval(fetchPosition, 5000);
        }

        function stopAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
        }

        phoneInput.addEventListener('input', function() {
            const phoneNumber = phoneInput.value.trim();
            
            stopAutoRefresh();
            
            if (isValidPhone(phoneNumber)) {
                fetchPosition();
                startAutoRefresh();
            } else {
                positionDisplay.textContent = '-';
                if (phoneNumber.length === 0) {
                    statusElement.textContent = 'Enter your phone number to check position';
                    statusElement.className = '';
                } else {
                    statusElement.textContent = 'Please enter a valid 10-digit phone number';
                    statusElement.className = 'error';
                }
            }
        });

        phoneInput.addEventListener('keypress', function(e) {
            if (!/\d/.test(e.key) && !['Backspace', 'Delete', 'Tab', 'Escape', 'Enter', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopAutoRefresh();
            } else if (isValidPhone(phoneInput.value.trim())) {
                startAutoRefresh();
            }
        });
    </script>
    <!--POSITION_DATA_START-->
    <!-- Position data will be inserted here by the cloud.py script -->
    <!--POSITION_DATA_END-->
</body>
</html>
