<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwality Restaurant Gallery - Gwalior</title>
    <meta name="description" content="Explore the beautiful ambiance and delicious cuisine of Kwality Restaurant through our gallery. View our elegant dining spaces, signature dishes, and more.">
    <link rel="stylesheet" href="./Assets/css/gallery.css">
    <link rel="stylesheet" href="./Assets/css/style.css">
    <link rel="icon" href="./Assets/images/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

    <div class="full-image">
        <div class="close-container" style="width: 100%; height: 100%;"></div>
        <div class="container">

            <img src="./Assets/images/gallery/gallery (1).jpeg" alt="" id="full-image-img" draggable="false">
        </div>
    </div>

    
    <!-- Loading screen -->

    <div class="loading-screen-1">
        <div class="display-6 text-white">
            <img src="./Assets/images/logo-white 1.png" alt="Kwality Restaurant Logo" width="200">
            <div class="loader"></div>
        </div>
    </div>

    <!-- landing -->

    <div class="landing mt-3 text-white" style="width: 100%;">
        <div class="heading container" style="width: 100%;">
            <h1 class=""><img src="./Assets/images/logo-white 1.png" width="150" alt=""></h1>
            <a href="index.html" class="home btn">
                <img src="https://img.icons8.com/?size=512&id=83326&format=png" alt="" width="30px" class="icon">
            </a>
        </div>
        
        <div class="bg-img background-1"></div>
    </div>

    <!-- Gallery -->

    <section class="gallery container">
        <div class="image-grid">
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (1).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (2).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal span-img">
                <img src="./Assets/images/gallery/gallery (7).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (4).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (5).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (6).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class="span-img left-reveal">
                <img src="./Assets/images/gallery/gallery (12).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (9).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (10).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (11).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (8).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
            <div class=" left-reveal">
                <img src="./Assets/images/gallery/gallery (3).jpeg" draggable="false" alt="" class="gallery-image">
            </div>
        </div>
    </section>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js" integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw==" crossorigin="anonymous" referrerpolicy="no-referrer">
        
    </script>
    <script>
        setTimeout(()=>{
            $('.loading-screen-1').fadeOut();
        }, '3000')
    </script>
    <script src="index.js"></script>
    <script src="gallery.js"></script>
    
</body>
</html>
