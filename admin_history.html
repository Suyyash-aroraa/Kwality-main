<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kwality Restaurant | Admin History</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 
                        0 1px 2px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(212, 175, 53, 0.1);
            position: relative;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af35, transparent);
        }
        
        .content-wrapper {
            padding: 30px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }
        
        .page-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 28px;
            color: #fff;
            position: relative;
            display: inline-block;
        }
        
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 40px;
            height: 2px;
            background-color: #d4af35;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        
        .btn-primary {
            background-color: #d4af35;
            box-shadow: 0 4px 15px rgba(212, 175, 53, 0.3);
        }
        
        .btn-primary:hover {
            background-color: #e5bd45;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 53, 0.4);
        }
        
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .btn i {
            margin-right: 8px;
            font-size: 14px;
        }
        
        .flash-message {
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            background-color: rgba(21, 87, 36, 0.15);
            border-left: 4px solid #28a745;
            display: flex;
            align-items: center;
            display: none;
        }

        .flash-message.show {
            display: flex;
        }
        
        .flash-message i {
            margin-right: 10px;
            color: #28a745;
            font-size: 18px;
        }

        .flash-message.error {
            background-color: rgba(255, 75, 75, 0.15);
            border-left-color: #ff4b4b;
        }

        .flash-message.error i {
            color: #ff4b4b;
        }
        
        .history-section {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .section-header {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            color: #d4af35;
        }
        
        .badge {
            display: inline-block;
            background-color: rgba(212, 175, 53, 0.2);
            color: #d4af35;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        th {
            background-color: rgba(255, 255, 255, 0.03);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        tbody tr {
            transition: all 0.2s ease;
        }
        
        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }
        
        td {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        .empty-message {
            padding: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .status-seated {
            background-color: rgba(40, 167, 69, 0.15);
            color: #28a745;
        }
        
        .status-removed {
            background-color: rgba(255, 75, 75, 0.15);
            color: #ff4b4b;
        }
        
        .status-waiting {
            background-color: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        
        .status-ready {
            background-color: rgba(0, 123, 255, 0.15);
            color: #007bff;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            color: #d4af35;
            font-size: 24px;
            animation: spin 1s linear infinite;
        }
        
        .decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 53, 0.05) 0%, rgba(212, 175, 53, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }
        
        .decoration-1 {
            top: -150px;
            right: -100px;
        }
        
        .decoration-2 {
            bottom: -150px;
            left: -100px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* iPad and mobile optimizations */
        @media (max-width: 1024px) {
            body {
                padding: 10px;
                font-size: 16px;
            }
            
            .container {
                max-width: 100%;
                margin: 0;
            }
            
            .content-wrapper {
                padding: 15px;
            }
            
            .page-title {
                font-size: 24px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 16px;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }
            
            .section-title {
                font-size: 18px;
            }

            /* Improve table layout on iPad */
            .table-responsive {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            /* Make buttons more touch-friendly */
            .btn {
                min-height: 44px;
            }
        }
        
        /* Phone optimizations */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            th, td {
                padding: 8px 6px;
                font-size: 12px;
            }
            
            /* Hide less important columns on small screens */
            th:nth-child(6), /* Time Ready */
            td:nth-child(6),
            th:nth-child(7), /* Wait Duration */
            td:nth-child(7) {
                display: none;
            }
        }
        
        /* Touch-friendly improvements */
        button, .btn {
            min-height: 44px;
        }

        .refresh-note {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .refresh-note i {
            margin-right: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <i class="fas fa-spinner loading-spinner"></i>
    </div>

    <div class="container">
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        
        <div class="content-wrapper">
            <div class="header">
                <h1 class="page-title">Waitlist History</h1>
                <div class="header-actions">
                    <a href="admin_dashboard.html" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                    <button onclick="logout()" class="btn btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
            
            <div id="flashMessage" class="flash-message">
                <i class="fas fa-check-circle"></i>
                <div id="flashText"></div>
            </div>
            
            <div class="history-section">
                <div class="section-header">
                    <h2 class="section-title">Complete Waitlist History</h2>
                    <span id="historyCount" class="badge">0 entries</span>
                </div>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Guest Name</th>
                                <th>Party Size</th>
                                <th>Date</th>
                                <th>Time Arrived</th>
                                <th>Time Ready</th>
                                <th>Wait Duration</th>
                                <th>Final Status</th>
                                <th>Waitlist Type</th>
                                <th>Phone</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <tr>
                                <td colspan="9" class="empty-message">Loading history data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="refresh-note">
                <i class="fas fa-info-circle"></i> 
                History data shows all waitlist entries and their outcomes
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'https://wombat-usable-turtle.ngrok-free.app';
        
        // Check authentication on page load
        window.addEventListener('load', function() {
            const token = sessionStorage.getItem('admin_token');
            if (!token) {
                window.location.href = 'admin_login.html';
                return;
            }
            
            // Load history data
            loadHistory();
        });
        
        async function makeApiRequest(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true',
                'Accept': 'application/json',
                ...options.headers
            };
            
            return fetch(url, {
                ...options,
                headers,
                mode: 'cors'
            });
        }
        
        async function loadHistory() {
            try {
                showLoading(true);
                
                const response = await makeApiRequest(`${API_BASE_URL}/api/admin/history`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    updateHistoryTable(data.data.history);
                    document.getElementById('historyCount').textContent = data.data.history.length + ' entries';
                } else {
                    showFlash('Error loading history data', 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showFlash(`Unable to connect to the server: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        function updateHistoryTable(historyData) {
            const tableBody = document.getElementById('historyTableBody');
            
            if (historyData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" class="empty-message">No history data available</td></tr>';
                return;
            }
            
            let html = '';
            historyData.forEach(entry => {
                const statusClass = `status-${entry.final_status.toLowerCase()}`;
                
                html += `
                    <tr>
                        <td>${entry.name}</td>
                        <td>${entry.party_size} guests</td>
                        <td>${entry.date}</td>
                        <td>${entry.time_arrived}</td>
                        <td>${entry.time_ready}</td>
                        <td>${entry.wait_duration}</td>
                        <td><span class="status-badge ${statusClass}">${entry.final_status}</span></td>
                        <td>${entry.waitlist_type}</td>
                        <td>${entry.phone}</td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
        }
        
        function showFlash(message, type = 'success') {
            const flashMessage = document.getElementById('flashMessage');
            const flashText = document.getElementById('flashText');
            const icon = flashMessage.querySelector('i');
            
            flashText.textContent = message;
            
            if (type === 'error') {
                flashMessage.className = 'flash-message error show';
                icon.className = 'fas fa-exclamation-circle';
            } else {
                flashMessage.className = 'flash-message show';
                icon.className = 'fas fa-check-circle';
            }
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                flashMessage.classList.remove('show');
            }, 3000);
        }
        
        function showLoading(show) {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (show) {
                loadingOverlay.classList.add('show');
            } else {
                loadingOverlay.classList.remove('show');
            }
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('admin_token');
                sessionStorage.removeItem('admin_username');
                window.location.href = 'admin_login.html';
            }
        }
    </script>
</body>
</html>
