<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Waitlist | Kwality Restaurant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af35, transparent);
            border-radius: 24px 24px 0 0;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
        }

        .location-status {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            display: none;
        }

        .location-status.checking {
            display: block;
            color: rgba(255, 255, 255, 0.7);
        }

        .location-status.verified {
            display: block;
            background: rgba(40, 167, 69, 0.15);
            border-color: rgba(40, 167, 69, 0.3);
            color: #28a745;
        }

        .location-status.failed {
            display: block;
            background: rgba(255, 75, 75, 0.15);
            border-color: rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #d4af35;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(212, 175, 53, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af35 0%, #e5bd45 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 53, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            background: rgba(255, 255, 255, 0.1);
        }

        .message {
            padding: 15px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #28a745;
        }

        .message.error {
            background: rgba(255, 75, 75, 0.15);
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #d4af35;
        }

        .loading {
            display: none;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 10px;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Join Our Waitlist</h1>
            <p>We'll notify you when your table is ready</p>
        </div>

        <div id="locationStatus" class="location-status checking">
            <i class="fas fa-map-marker-alt"></i> Verifying your location...
        </div>

        <div id="message" class="message"></div>

        <form id="joinForm" style="display: none;">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="party_size">Party Size</label>
                <input type="text" id="party_size" name="party_size" placeholder="Enter your party size" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-plus"></i> Join Waitlist
            </button>
        </form>

        <div id="loading" class="loading">
            <i class="fas fa-spinner"></i> Adding you to the waitlist...
        </div>

        <div class="back-link">
            <a href="status.html">
                <i class="fas fa-search"></i> Check your waitlist status
            </a>
        </div>
        <div class="back-link">
            <a href="admin_login.html">
                Admin Login
            </a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://wombat-usable-turtle.ngrok-free.app';
        
        // Restaurant coordinates (Kwality Restaurant)
        const RESTAURANT_LAT = 26.208391;
        const RESTAURANT_LNG = 78.189380;
        const MAX_DISTANCE = 30; // meters
        
        let userLocation = null;
        let locationVerified = false;

        // Calculate distance between two coordinates using Haversine formula
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000; // Earth's radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                     Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c;
            return distance;
        }

        // Get user's current position
        function getCurrentLocation() {
            const locationStatus = document.getElementById('locationStatus');
            
            if (!navigator.geolocation) {
                locationStatus.className = 'location-status failed';
                locationStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Geolocation is not supported by this browser';
                return;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 60000
            };

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    userLocation = { lat: userLat, lng: userLng };
                    
                    console.log('User location:', userLat, userLng);
                    
                    // Calculate distance from restaurant
                    const distance = calculateDistance(userLat, userLng, RESTAURANT_LAT, RESTAURANT_LNG);
                    console.log('Distance from restaurant:', distance, 'meters');
                    
                    if (distance <= MAX_DISTANCE) {
                        // User is within acceptable range
                        locationStatus.className = 'location-status verified';
                        locationStatus.innerHTML = '<i class="fas fa-check-circle"></i> Location verified - You\'re at the restaurant!';
                        locationVerified = true;
                        
                        // Show the form
                        document.getElementById('joinForm').style.display = 'block';
                        
                        // Hide location status after 3 seconds
                        setTimeout(() => {
                            locationStatus.style.display = 'none';
                        }, 3000);
                    } else {
                        // User is too far from restaurant
                        locationStatus.className = 'location-status failed';
                        const distanceKm = (distance / 1000).toFixed(2);
                        locationStatus.innerHTML = `<i class="fas fa-times-circle"></i> You need to be at the restaurant to join the waitlist<br><small>You are ${distanceKm}km away from Kwality Restaurant</small>`;
                        locationVerified = false;
                    }
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    let errorMessage = '';
                    
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'Location access denied. Please enable location services and refresh the page.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = 'Location information is unavailable. Please try again.';
                            break;
                        case error.TIMEOUT:
                            errorMessage = 'Location request timed out. Please try again.';
                            break;
                        default:
                            errorMessage = 'An unknown error occurred while retrieving location.';
                            break;
                    }
                    
                    locationStatus.className = 'location-status failed';
                    locationStatus.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${errorMessage}`;
                    locationVerified = false;
                },
                options
            );
        }

        // Initialize location check when page loads
        document.addEventListener('DOMContentLoaded', function() {
            getCurrentLocation();
        });

        // Handle form submission
        document.getElementById('joinForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!locationVerified) {
                showMessage('Please verify your location first', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const messageDiv = document.getElementById('message');
            
            // Get form data
            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                party_size: document.getElementById('party_size').value,
                location: userLocation // Include user's location in the request
            };
            
            // Basic validation
            if (!formData.name || !formData.phone || !formData.party_size) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            loading.style.display = 'block';
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    // Clear form
                    document.getElementById('joinForm').reset();
                    
                    // Redirect to status page after 2 seconds
                    setTimeout(() => {
                        window.location.href = `status.html?phone=${encodeURIComponent(formData.phone)}`;
                    }, 2000);
                } else {
                    showMessage(data.message, 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Unable to connect to the server. Please try again.', 'error');
            } finally {
                // Hide loading state
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
        
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Auto hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>

</html>
